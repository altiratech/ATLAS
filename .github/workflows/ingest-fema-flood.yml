name: Ingest FEMA Flood Baseline

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: First Atlas year to stamp with FEMA flood evidence (YYYY)
        required: true
        default: '2023'
      end_year:
        description: Last Atlas year to stamp with FEMA flood evidence (YYYY)
        required: true
        default: '2025'
      states_csv:
        description: Optional comma-separated state list (blank = all states)
        required: false
        default: ''

jobs:
  ingest-fema-flood:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: deploy/cloudflare-worker/package-lock.json

      - name: Install worker dependencies
        working-directory: deploy/cloudflare-worker
        run: npm ci

      - name: Generate staged SQL from FEMA flood services
        working-directory: deploy/cloudflare-worker
        run: |
          set -euo pipefail
          SQL_PATH="${RUNNER_TEMP}/atlas-fema-flood.sql"
          SUMMARY_PATH="${RUNNER_TEMP}/atlas-fema-flood-summary.json"
          echo "SQL_PATH=${SQL_PATH}" >> "${GITHUB_ENV}"
          echo "SUMMARY_PATH=${SUMMARY_PATH}" >> "${GITHUB_ENV}"
          EXTRA_ARGS=()
          if [ -n "${{ inputs.states_csv }}" ]; then
            EXTRA_ARGS+=(--states "${{ inputs.states_csv }}")
          fi
          node ./scripts/ingest-fema-flood.mjs \
            --start_year "${{ inputs.start_year }}" \
            --end_year "${{ inputs.end_year }}" \
            "${EXTRA_ARGS[@]}" \
            --sql_file "${SQL_PATH}" \
            --summary_json "${SUMMARY_PATH}"

      - name: Import staged SQL into D1
        working-directory: deploy/cloudflare-worker
        env:
          CLOUDFLARE_DEPLOY_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_D1_IMPORT_TOKEN: ${{ secrets.CLOUDFLARE_D1_IMPORT_TOKEN }}
        run: |
          set -euo pipefail
          export CLOUDFLARE_API_TOKEN="${CLOUDFLARE_D1_IMPORT_TOKEN:-${CLOUDFLARE_DEPLOY_TOKEN}}"
          npx wrangler d1 execute farmland-terminal-db --remote --file "${SQL_PATH}"

      - name: Upload FEMA flood ingest summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-fema-flood-summary
          path: ${{ env.SUMMARY_PATH }}
          if-no-files-found: ignore
