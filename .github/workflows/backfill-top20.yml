name: Backfill Top-20 Atlas Data

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: First year to ingest (YYYY)
        required: true
        default: '2005'
      end_year:
        description: Last year to ingest (YYYY)
        required: true
        default: '2026'
      chunk_size:
        description: Years per ingest call
        required: true
        default: '1'
      states_csv:
        description: Comma-separated state list (e.g. IA,IL,IN)
        required: true
        default: 'IA,IL,IN,NE,KS,MN,OH,WI,MO,SD,ND,TX,CA,WA,OR,ID,MT,CO,MI,PA'
      run_macro:
        description: Run one final national pass for FRED + ag index
        required: true
        default: 'true'
      ingest_max_time:
        description: Max seconds per ingest HTTP call
        required: true
        default: '900'
      fallback_by_series:
        description: Retry failed state/year NASS calls one series at a time
        required: true
        default: 'true'
      base_url:
        description: Atlas API base URL
        required: true
        default: 'https://atlas.altiratech.com'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Run top-20 backfill
        working-directory: deploy/cloudflare-worker
        env:
          ATLAS_INGEST_ADMIN_TOKEN: ${{ secrets.ATLAS_INGEST_ADMIN_TOKEN }}
          ATLAS_CF_ACCESS_CLIENT_ID: ${{ secrets.ATLAS_CF_ACCESS_CLIENT_ID }}
          ATLAS_CF_ACCESS_CLIENT_SECRET: ${{ secrets.ATLAS_CF_ACCESS_CLIENT_SECRET }}
          ATLAS_BASE_URL: ${{ inputs.base_url }}
          ATLAS_BACKFILL_STATES: ${{ inputs.states_csv }}
          ATLAS_BACKFILL_RUN_MACRO: ${{ inputs.run_macro }}
          ATLAS_INGEST_MAX_TIME: ${{ inputs.ingest_max_time }}
          ATLAS_BACKFILL_FALLBACK_BY_SERIES: ${{ inputs.fallback_by_series }}
        run: |
          ./scripts/backfill-top20.sh "${{ inputs.start_year }}" "${{ inputs.end_year }}" "${{ inputs.chunk_size }}"
