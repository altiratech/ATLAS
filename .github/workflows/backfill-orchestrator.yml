name: Atlas Backfill Orchestrator

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: First year to process (YYYY)
        required: true
        default: '2005'
      end_year:
        description: Last year to process (YYYY)
        required: true
        default: '2026'
      states_csv:
        description: Comma-separated state list
        required: true
        default: 'IA,IL,IN,NE,KS,MN,OH,WI,MO,SD,ND,TX,CA,WA,OR,ID,MT,CO,MI,PA'
      batch_size:
        description: Bulk rows per API batch (max 1000)
        required: true
        default: '500'
      max_retries:
        description: Max retries per year/state unit
        required: true
        default: '3'
      include_crops:
        description: Include NASS crops bulk file
        required: true
        default: 'true'
      include_economics:
        description: Include NASS economics bulk file
        required: true
        default: 'true'
      run_macro:
        description: Run one macro pass (FRED + ag index) at end
        required: true
        default: 'true'
      resume:
        description: Skip units already marked success in ingest_progress
        required: true
        default: 'true'
      request_timeout_ms:
        description: Timeout per API call in milliseconds
        required: true
        default: '120000'
      base_url:
        description: Atlas API base URL
        required: true
        default: 'https://atlas.altiratech.com'

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run backfill orchestrator
        working-directory: deploy/cloudflare-worker
        env:
          ATLAS_INGEST_ADMIN_TOKEN: ${{ secrets.ATLAS_INGEST_ADMIN_TOKEN }}
          ATLAS_CF_ACCESS_CLIENT_ID: ${{ secrets.ATLAS_CF_ACCESS_CLIENT_ID }}
          ATLAS_CF_ACCESS_CLIENT_SECRET: ${{ secrets.ATLAS_CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          SUMMARY_PATH="${RUNNER_TEMP}/atlas-backfill-summary.json"
          echo "SUMMARY_PATH=${SUMMARY_PATH}" >> "${GITHUB_ENV}"
          node ./scripts/backfill-orchestrator.mjs \
            --start-year "${{ inputs.start_year }}" \
            --end-year "${{ inputs.end_year }}" \
            --states "${{ inputs.states_csv }}" \
            --batch-size "${{ inputs.batch_size }}" \
            --max-retries "${{ inputs.max_retries }}" \
            --include-crops "${{ inputs.include_crops }}" \
            --include-economics "${{ inputs.include_economics }}" \
            --run-macro "${{ inputs.run_macro }}" \
            --resume "${{ inputs.resume }}" \
            --request-timeout-ms "${{ inputs.request_timeout_ms }}" \
            --base-url "${{ inputs.base_url }}" \
            --summary-json "${SUMMARY_PATH}"

      - name: Upload orchestrator summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-backfill-summary
          path: ${{ env.SUMMARY_PATH }}
          if-no-files-found: ignore

      - name: Publish workflow notice
        if: always()
        run: |
          if [[ -f "${{ env.SUMMARY_PATH }}" ]]; then
            echo "::notice::Backfill summary written to step summary and uploaded as artifact atlas-backfill-summary."
          else
            echo "::warning::Backfill summary JSON not found; check orchestrator logs for details."
          fi
